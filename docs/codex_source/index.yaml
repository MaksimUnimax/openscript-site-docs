  current_docs_paths:
    current_status: "docs/codex_source/project/current_status.md"
    context: "docs/codex_source/context/current_dialogue_context.md"
    roadmap: "docs/codex_source/roadmap/imported/roadmap_v0_1_initial_site_baseline.md"
