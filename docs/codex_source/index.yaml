notes:
  - This index is for the OpenScript / AI Starter Community website docs only.
  - Legacy imported references may remain in the repo for history, but the canonical active project docs are the OpenScript site docs listed above.
  - Legacy Agent Lab / YouTube Research imports remain historical reference only and must not override the current OpenScript site memory.
  - Agent Lab, APM, Telegram/VK, and OpenDesign Lab are out of scope for this OpenScript site snapshot.
  - Frontend/design skill references are candidate docs for future lesson UI testing and are separate from course-writing skills.
  - Figma was excluded from this import because no Figma design exists for the task.
  - Do not use this index to infer runtime behavior; always read exact task docs and source-of-truth files.
