version: 0.1
purpose: >
  Единая карта документационного слоя OpenScript / AI Starter Community для будущих Codex prompt'ов.
  Используется для выбора exact paths, контроля обязательных источников и остановки run'ов при missing docs.
  Legacy OpenScript Agent Lab material may exist only as clearly marked imported history.
directory_map:
  root: docs/codex_source
  schemas: docs/codex_source/_schemas
  templates: docs/codex_source/templates
  vendor: docs/codex_source/vendor
  vendor_hermes: docs/codex_source/vendor/hermes
  vendor_telegram: docs/codex_source/vendor/telegram
  vendor_youtube_transcript_api: docs/codex_source/vendor/youtube_transcript_api
  vendor_yt_search_python: docs/codex_source/vendor/yt_search_python
  project: docs/codex_source/project
  task_cards: docs/codex_source/task_cards
rules:
  - Roadmap не является vendor documentation.
  - Continuity/handoff не является vendor documentation.
  - Project ТЗ не заменяет vendor/runtime/API docs.
  - Codex должен читать exact paths из task cards, а не полагаться на память.
  - Если required doc имеет status: stub, future fix-run must stop with STOP_DOCS_MISSING.

current_project:
  canonical_name: "OpenScript / AI Starter Community"
  main_site: "https://openscript.ru"
  main_app_repo_path: "/opt/ai-starter-community"
  docs_repo_path: "/opt/openscript-site-docs"
  public_docs_repo: "https://github.com/MaksimUnimax/openscript-site-docs"
  active_scope: "main_site"
